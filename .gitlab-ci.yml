stages:
  - build

variables:
  FF_USE_FASTZIP: 1
  CACHE_COMPRESSION_LEVEL: "fastest"

build:
  stage: build
  image: registry.gitlab.tigers-mannheim.de/main/tigers-buildroot/ubuntu:rpi-24.04
  script:
    - cmake -B build -DCMAKE_SYSROOT=/opt/gimbal_pizero-sysroot -DCMAKE_PREFIX_PATH=/opt/arm-none-linux-gnueabihf -DCMAKE_TOOLCHAIN_FILE=cmake/arm-none-linux-gnueabihf.toolchain.cmake .
    - cmake --build build -j
  artifacts:
    expire_in: 1 hrs
    name: gimbal-rpi-build-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
    paths:
      - build

build-image-pizero:
  stage: build
  image: registry.gitlab.tigers-mannheim.de/main/tigers-buildroot/ubuntu:cxxDev-24.04
  tags:
    - buildroot  
  cache:
    key: rpi3-buildroot
    paths:
      - tigers-buildroot/buildroot-ccache
      - tigers-buildroot/buildroot-dl
    when: 'always'
  script:
    - git clone --branch master --single-branch https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.tigers-mannheim.de/main/tigers-buildroot.git tigers-buildroot-clone
    - mkdir -p tigers-buildroot
    - rsync -a tigers-buildroot-clone/ tigers-buildroot/
    - cd tigers-buildroot
    - git submodule update --init
    - rm -rf tigers/package/gimbal-rpi
    - git clone --branch $CI_COMMIT_REF_NAME --single-branch --recursive https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.tigers-mannheim.de/main/gimbal-rpi.git tigers/package/gimbal-rpi
    - echo -e '\nsource "$BR2_EXTERNAL_TIGERS_PATH/package/gimbal-rpi/Config.in"' >> tigers/Config.in
    - echo -e '\nBR2_PACKAGE_GIMBAL_RPI=y' >> tigers/configs/gimbal_pizero_defconfig
    - cat tigers/Config.in
    - cat tigers/configs/gimbal_pizero_defconfig
    - export BR2_CCACHE_DIR="$PWD/buildroot-ccache"
    - cd tigers
    - mkdir -p board/gimbal_pizero/overlay/usr/lib/firmware
    - 'curl --fail -OJ -o mcu.zip --header "JOB-TOKEN: $CI_JOB_TOKEN" "https://gitlab.tigers-mannheim.de/api/v4/projects/main%2Fgimbal-mcu-firmware/jobs/artifacts/master/download?job=deploy"'
    - unzip mcu.zip -d board/gimbal_pizero/overlay/usr/lib/firmware
    - ls board/gimbal_pizero/overlay/usr/lib/firmware
    - make gimbal_pizero_initramfs_defconfig
    - cd output/gimbal_pizero_initramfs
    - make clean
    - make -j8
    - cd ../..
    - make gimbal_pizero_defconfig
    - cd output/gimbal_pizero
    - make clean
    - make -j8
    - cd ../../../..
    - 'echo "gimbal-rpi: $CI_COMMIT_REF_NAME ($CI_COMMIT_SHA)" >> versions'
    - mkdir -p gimbal-rpi
    - mv tigers-buildroot/tigers/output/gimbal_pizero/images/update.squashfs gimbal-rpi/update.squashfs
  artifacts:
    name: gimbal-rpi-update-$CI_JOB_NAME-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
    paths:
      - gimbal-rpi
      - versions
#  only:
#    - tags
#    - master
